# supabase/config.toml

[api]
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324

[auth]
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "https://localhost:5173",
  "http://localhost:5173/auth/google/callback",
]
jwt_expiry = 604800  # 7 days — reduces token refresh calls on page load
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

[auth.external.google]
enabled = false
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"

# ── Edge Functions ──────────────────────────────────────────────────────────
# Each function's local env vars (for `supabase functions serve`).
# These match what you set in the Supabase Dashboard → Project Settings → Secrets.

[functions.create-student-user]
verify_jwt = false   # Function verifies JWT manually via supabaseAdmin.auth.getUser()

[functions.exchange-google-token]
verify_jwt = false   # Same — manual JWT verification inside the function

[functions.send-push]
verify_jwt = false   # called server-side with service role, not user JWT

[functions.monthly-cron]
verify_jwt = false   # protected by CRON_SECRET header instead
