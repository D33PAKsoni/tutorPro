<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Push Debug v2 — Tuition Pro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@600;700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0d12; --surface: #11151c; --surface2: #181d26; --border: #1e2535;
    --text: #e2e8f0; --muted: #64748b;
    --pass: #22c55e; --fail: #ef4444; --warn: #f59e0b; --info: #3b82f6; --accent: #6366f1;
    --font-mono: 'JetBrains Mono', monospace; --font-display: 'Syne', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 13px; line-height: 1.6; min-height: 100dvh; padding: 24px 16px 48px; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .header-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .header h1 { font-family: var(--font-display); font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: #fff; }
  .header p { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .section-title { font-family: var(--font-display); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 10px; margin-top: 20px; }
  .config-grid { display: grid; gap: 10px; margin-bottom: 20px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .field input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font-mono); font-size: 12px; padding: 9px 12px; outline: none; transition: border-color 0.15s; width: 100%; }
  .field input:focus { border-color: var(--accent); }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  button { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; font-family: var(--font-mono); font-size: 12px; font-weight: 600; padding: 9px 16px; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
  button:hover { background: var(--border); border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { background: #5254d4; }
  button.danger { background: rgba(239,68,68,0.15); border-color: var(--fail); color: var(--fail); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .tests { display: flex; flex-direction: column; gap: 6px; }
  .test-row { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; flex-direction: column; gap: 4px; }
  .test-row.pass  { border-left: 3px solid var(--pass); }
  .test-row.fail  { border-left: 3px solid var(--fail); }
  .test-row.warn  { border-left: 3px solid var(--warn); }
  .test-row.info  { border-left: 3px solid var(--info); }
  .test-row.running { border-left: 3px solid var(--accent); }
  .test-header { display: flex; align-items: center; gap: 8px; }
  .test-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0; }
  .pass .test-badge  { background: rgba(34,197,94,0.15);  color: var(--pass); }
  .fail .test-badge  { background: rgba(239,68,68,0.15);  color: var(--fail); }
  .warn .test-badge  { background: rgba(245,158,11,0.15); color: var(--warn); }
  .info .test-badge  { background: rgba(59,130,246,0.15); color: var(--info); }
  .running .test-badge { background: rgba(99,102,241,0.15); color: var(--accent); }
  .test-name { font-weight: 600; font-size: 12px; flex: 1; }
  .test-detail { color: var(--muted); font-size: 11px; padding-left: 2px; }
  .test-detail.error-text { color: #fca5a5; }
  .code-block { background: var(--surface2); border-radius: 6px; padding: 8px 10px; margin-top: 4px; white-space: pre-wrap; word-break: break-all; font-size: 10.5px; color: #94a3b8; border: 1px solid var(--border); }
  #log { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-size: 11px; color: #94a3b8; max-height: 320px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; margin-top: 8px; line-height: 1.7; }
  #log .l-pass { color: var(--pass); } #log .l-fail { color: var(--fail); } #log .l-warn { color: var(--warn); } #log .l-info { color: var(--info); }
  .spinner { width: 12px; height: 12px; border: 2px solid rgba(99,102,241,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .note { background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2); border-radius: 8px; padding: 10px 14px; font-size: 11px; color: #93c5fd; margin-bottom: 16px; line-height: 1.6; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🔔</div>
  <div>
    <h1>Push Debug v2 — Server Side</h1>
    <p>Subscription saves correctly. This tool diagnoses why send-push fails.</p>
  </div>
</div>

<div class="note">
  ✓ Subscription rows are being created in the DB.<br>
  This tool focuses entirely on: secrets → edge function → FCM delivery → SW receipt.
</div>

<div class="section-title">Configuration</div>
<div class="config-grid">
  <div class="field">
    <label>Supabase Project URL</label>
    <input id="cfg-url" placeholder="https://xxxxxxxxxxxx.supabase.co" />
  </div>
  <div class="field">
    <label>Supabase Anon Key</label>
    <input id="cfg-anon" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." />
  </div>
  <div class="field">
    <label>User ID (Supabase Dashboard → Auth → Users → your UUID)</label>
    <input id="cfg-uid" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
  </div>
  <div class="field">
    <label>Service Role Key (Dashboard → Settings → API → service_role — keep secret!)</label>
    <input id="cfg-service" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." type="password" />
  </div>
</div>

<div class="btn-row">
  <button class="primary" onclick="runAll()">▶ Run All Checks</button>
  <button onclick="checkSecrets()">① Check Secrets</button>
  <button onclick="checkSubscriptions()">② Check DB Rows</button>
  <button onclick="testSendPush()">③ Test Send Push</button>
  <button onclick="testSWDirect()">④ SW Direct Test</button>
  <button onclick="checkSWLogs()">⑤ Check SW State</button>
  <button onclick="copyReport()">Copy Report</button>
  <button onclick="clearAll()">Clear</button>
</div>

<div class="section-title">Results</div>
<div class="tests" id="results"></div>

<hr/>
<div class="section-title">Console Log</div>
<div id="log">Ready.\n</div>

<script>
const log = (msg, level='info') => {
  const ts = new Date().toISOString().slice(11,23);
  const el = document.getElementById('log');
  const span = document.createElement('span');
  span.className = `l-${level}`;
  span.textContent = `[${ts}] ${msg}\n`;
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
};

function cfg(id) { return document.getElementById(id)?.value?.trim() || ''; }

function setResult(id, name, status, detail, code) {
  let el = document.getElementById('r-' + id);
  if (!el) {
    el = document.createElement('div');
    el.id = 'r-' + id;
    document.getElementById('results').appendChild(el);
  }
  el.className = `test-row ${status}`;
  el.innerHTML = `
    <div class="test-header">
      <span class="test-badge">${status === 'running' ? '…' : status}</span>
      <span class="test-name">${name}</span>
      ${status === 'running' ? '<div class="spinner"></div>' : ''}
    </div>
    ${detail ? `<div class="test-detail ${status==='fail'?'error-text':''}">${detail}</div>` : ''}
    ${code   ? `<div class="code-block">${escHtml(code)}</div>` : ''}
  `;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function clearAll() {
  document.getElementById('results').innerHTML = '';
  document.getElementById('log').innerHTML = 'Cleared.\n';
}

// ── ① Check VAPID secrets are set on the function ───────────────────────────
async function checkSecrets() {
  setResult('secrets', 'VAPID Secrets Configured', 'running', 'Calling send-push with dummy user to probe secrets…');
  const url  = cfg('cfg-url');
  const anon = cfg('cfg-anon');
  if (!url || !anon) { setResult('secrets', 'VAPID Secrets Configured', 'warn', 'Fill in Supabase URL and Anon Key'); return; }

  try {
    // Call with a fake user_id — if secrets are missing we get a 500 before it even queries the DB
    const res = await fetch(`${url}/functions/v1/send-push`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${anon}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: '00000000-0000-0000-0000-000000000000', title: 'secrets-probe' }),
    });
    const data = await res.json().catch(() => ({}));
    log(`Secrets probe: HTTP ${res.status} — ${JSON.stringify(data)}`, res.ok ? 'pass' : 'fail');

    if (res.status === 500 && JSON.stringify(data).includes('VAPID')) {
      setResult('secrets', 'VAPID Secrets Configured', 'fail',
        'VAPID secrets are NOT set on the edge function.',
        `Fix:\n  supabase secrets set VAPID_SUBJECT=mailto:you@email.com\n  supabase secrets set VAPID_PUBLIC_KEY=your_public_key\n  supabase secrets set VAPID_PRIVATE_KEY=your_private_key\n\nThen redeploy:\n  supabase functions deploy send-push\n\nResponse: ${JSON.stringify(data, null, 2)}`);
      return false;
    }
    if (res.status === 404) {
      setResult('secrets', 'VAPID Secrets Configured', 'fail',
        'Edge function not found — it is not deployed.',
        'Fix: supabase functions deploy send-push');
      return false;
    }
    if (res.status === 500) {
      setResult('secrets', 'VAPID Secrets Configured', 'fail',
        `Function returned 500 — check Supabase Edge Function logs`,
        JSON.stringify(data, null, 2));
      return false;
    }
    // 200 with "No subscriptions" = secrets are fine, function runs
    setResult('secrets', 'VAPID Secrets Configured', 'pass',
      'Edge function is deployed and VAPID secrets are present',
      JSON.stringify(data, null, 2));
    return true;
  } catch(e) {
    log(`Secrets probe error: ${e.message}`, 'fail');
    setResult('secrets', 'VAPID Secrets Configured', 'fail', `Network error: ${e.message}`);
    return false;
  }
}

// ── ② Check DB subscriptions ────────────────────────────────────────────────
async function checkSubscriptions() {
  setResult('db', 'Subscription Rows in DB', 'running', 'Querying push_subscriptions with service role key…');
  const url        = cfg('cfg-url');
  const serviceKey = cfg('cfg-service');
  const uid        = cfg('cfg-uid');

  if (!url || !serviceKey) {
    setResult('db', 'Subscription Rows in DB', 'warn',
      'Fill in Supabase URL and Service Role Key to query DB directly.\nService role key bypasses RLS so we can see all rows.');
    return null;
  }

  try {
    const filter = uid ? `?user_id=eq.${uid}` : '?limit=10';
    const res = await fetch(`${url}/rest/v1/push_subscriptions${filter}&select=id,user_id,endpoint,p256dh,auth_key,created_at`, {
      headers: { 'apikey': serviceKey, 'Authorization': `Bearer ${serviceKey}` },
    });
    const rows = await res.json();
    log(`DB query: HTTP ${res.status}, rows=${Array.isArray(rows) ? rows.length : '?'}`, res.ok ? 'pass' : 'fail');

    if (!res.ok) {
      setResult('db', 'Subscription Rows in DB', 'fail',
        `Query failed: HTTP ${res.status}`,
        JSON.stringify(rows, null, 2));
      return null;
    }

    if (!Array.isArray(rows) || rows.length === 0) {
      setResult('db', 'Subscription Rows in DB', 'fail',
        uid ? `No rows for user_id = ${uid}` : 'Table is empty',
        'Go to your app → Settings → Push Notifications → Enable.\nThen come back and run this check again.');
      return null;
    }

    // Validate each row has required fields
    const issues = [];
    rows.forEach((r, i) => {
      if (!r.endpoint) issues.push(`Row ${i}: missing endpoint`);
      if (!r.p256dh)   issues.push(`Row ${i}: missing p256dh`);
      if (!r.auth_key) issues.push(`Row ${i}: missing auth_key`);
      if (r.p256dh && r.p256dh.length < 80)  issues.push(`Row ${i}: p256dh looks short (${r.p256dh.length} chars, expect ~88)`);
      if (r.auth_key && r.auth_key.length < 20) issues.push(`Row ${i}: auth_key looks short (${r.auth_key.length} chars, expect ~24)`);
    });

    const detail = rows.map((r, i) => [
      `Row ${i+1}:`,
      `  user_id:  ${r.user_id}`,
      `  endpoint: ${r.endpoint?.slice(0,70)}…`,
      `  p256dh:   ${r.p256dh?.slice(0,40)}… (${r.p256dh?.length} chars)`,
      `  auth_key: ${r.auth_key} (${r.auth_key?.length} chars)`,
      `  created:  ${r.created_at}`,
    ].join('\n')).join('\n\n');

    if (issues.length > 0) {
      setResult('db', 'Subscription Rows in DB', 'warn',
        `${rows.length} row(s) found but with issues:\n${issues.join('\n')}`, detail);
    } else {
      setResult('db', 'Subscription Rows in DB', 'pass',
        `${rows.length} valid subscription row(s) found`, detail);
    }
    return rows;
  } catch(e) {
    log(`DB check error: ${e.message}`, 'fail');
    setResult('db', 'Subscription Rows in DB', 'fail', e.message);
    return null;
  }
}

// ── ③ Test send-push and show per-subscription result ───────────────────────
async function testSendPush() {
  setResult('send', 'send-push Edge Function Delivery', 'running', 'Invoking send-push…');
  const url  = cfg('cfg-url');
  const anon = cfg('cfg-anon');
  const uid  = cfg('cfg-uid');

  if (!url || !anon || !uid) {
    setResult('send', 'send-push Edge Function Delivery', 'warn', 'Fill in URL, Anon Key, and User ID');
    return;
  }

  try {
    log(`Invoking send-push for user ${uid}…`, 'info');
    const res = await fetch(`${url}/functions/v1/send-push`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${anon}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_id: uid,
        title: '🔔 Debug Test',
        body: 'If you see this — push notifications are working!',
        url: '/',
      }),
    });
    const data = await res.json().catch(() => ({}));
    log(`send-push HTTP ${res.status}: ${JSON.stringify(data)}`, res.ok ? 'pass' : 'fail');

    if (!res.ok) {
      setResult('send', 'send-push Edge Function Delivery', 'fail',
        `HTTP ${res.status} — function error`,
        diagnose(res.status, data));
      return;
    }

    const { sent, total, results, message } = data;

    if (message?.includes('No subscriptions')) {
      setResult('send', 'send-push Edge Function Delivery', 'fail',
        'No subscriptions found for this user_id',
        'Make sure:\n1. User ID is correct\n2. You enabled push notifications in the app\n3. Check step ② DB Rows');
      return;
    }

    // Build per-result detail
    let resultDetail = '';
    if (Array.isArray(results)) {
      resultDetail = results.map(r =>
        `${r.outcome === 'delivered' ? '✓' : '✗'} ${r.endpoint}\n  status: ${r.status}  outcome: ${r.outcome}`
      ).join('\n\n');
    }

    if (sent > 0) {
      setResult('send', 'send-push Edge Function Delivery', 'pass',
        `✓ Delivered to ${sent}/${total} subscription(s) — check your device now!`,
        resultDetail || JSON.stringify(data, null, 2));
    } else {
      // sent=0 — diagnose each result
      const statuses = (results || []).map(r => r.status);
      let hint = diagnoseDelivery(statuses, results);
      setResult('send', 'send-push Edge Function Delivery', 'fail',
        `Sent 0/${total} — all deliveries failed`,
        (resultDetail || JSON.stringify(data, null, 2)) + '\n\n' + hint);
    }
  } catch(e) {
    log(`send-push error: ${e.message}`, 'fail');
    setResult('send', 'send-push Edge Function Delivery', 'fail', `Network error: ${e.message}`);
  }
}

function diagnose(status, data) {
  const msg = JSON.stringify(data);
  let out = JSON.stringify(data, null, 2) + '\n\n--- Diagnosis ---\n';
  if (status === 404)  out += '→ Function not deployed. Run: supabase functions deploy send-push\n';
  if (status === 401)  out += '→ Auth error. Anon key may be wrong.\n';
  if (status === 500 && msg.includes('VAPID')) out += '→ VAPID secrets missing. Run supabase secrets set ...\n';
  if (status === 500 && msg.includes('web-push')) out += '→ npm:web-push import failed. Make sure you deployed the v10 send-push file.\n';
  if (status === 500)  out += '→ Check Supabase Dashboard → Edge Functions → send-push → Logs for full error.\n';
  return out;
}

function diagnoseDelivery(statuses, results) {
  let out = '--- Delivery Diagnosis ---\n';
  const has = (s) => statuses.includes(s);
  if (has(401)) out += '→ HTTP 401: VAPID JWT rejected by FCM.\n   Most common cause: VAPID_PUBLIC_KEY on the server does not match\n   VITE_VAPID_PUBLIC_KEY used when the subscription was created.\n   Fix: Make sure both keys are identical, then re-subscribe.\n';
  if (has(403)) out += '→ HTTP 403: VAPID key mismatch with this subscription.\n   The subscription was created with a different VAPID public key.\n   Fix: Delete DB rows, re-subscribe in the app.\n';
  if (has(400)) out += '→ HTTP 400: Bad request to push service.\n   Could be malformed encryption or invalid subscription data.\n   Fix: Delete DB rows, re-subscribe, redeploy send-push.\n';
  if (has(410) || has(404)) out += '→ HTTP 410/404: Subscription expired.\n   Fix: Re-subscribe in the app. Expired rows will be auto-deleted.\n';
  if (statuses.every(s => s === 0)) out += '→ All deliveries threw exceptions (status=0).\n   Check Supabase → Edge Functions → send-push → Logs for the exact error.\n';
  if (!out.includes('→')) out += '→ Unknown failure. Check Supabase → Edge Functions → send-push → Logs.\n';
  out += '\nAlways check: Supabase Dashboard → Edge Functions → send-push → Logs';
  return out;
}

// ── ④ SW direct notification test ───────────────────────────────────────────
async function testSWDirect() {
  setResult('sw-direct', 'Service Worker Direct Notification', 'running', 'Testing SW showNotification…');
  if (Notification.permission !== 'granted') {
    setResult('sw-direct', 'Service Worker Direct Notification', 'fail',
      'Notification permission not granted on this device/browser');
    return;
  }
  try {
    const regs = await navigator.serviceWorker.getRegistrations();
    if (!regs.length) {
      setResult('sw-direct', 'Service Worker Direct Notification', 'fail',
        'No service worker registered on this page.\nOpen your app first, then come back here.');
      return;
    }
    const reg = await navigator.serviceWorker.ready;
    await reg.showNotification('🔔 SW Direct Test', {
      body: 'This came directly from the SW — no server involved.',
      icon: '/icons/icon-192.png',
      tag: 'debug-sw-direct',
    });
    log('SW direct notification fired', 'pass');
    setResult('sw-direct', 'Service Worker Direct Notification', 'pass',
      'Notification fired from SW directly.\nIf it appeared on your device → SW is fine, problem is server-side only.\nIf it did NOT appear → browser is blocking notifications regardless of server.');
  } catch(e) {
    setResult('sw-direct', 'Service Worker Direct Notification', 'fail', e.message);
  }
}

// ── ⑤ SW State check ────────────────────────────────────────────────────────
async function checkSWLogs() {
  setResult('sw-state', 'Service Worker State', 'running', 'Checking SW…');
  try {
    const regs = await navigator.serviceWorker.getRegistrations();
    if (!regs.length) {
      setResult('sw-state', 'Service Worker State', 'fail',
        'No SW registered. Open your app at its URL first.');
      return;
    }
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    const detail = [
      `SW URL: ${reg.active?.scriptURL || 'unknown'}`,
      `SW state: ${reg.active?.state || 'none'}`,
      `Push subscription on this browser: ${sub ? '✓ exists' : '✗ none'}`,
      sub ? `Endpoint: ${sub.endpoint.slice(0,70)}…` : '',
      sub ? `Expiry: ${sub.expirationTime ?? 'none (good)'}` : '',
      `Page origin: ${location.origin}`,
    ].filter(Boolean).join('\n');

    log(`SW check: ${reg.active?.state}, sub=${!!sub}`, sub ? 'pass' : 'warn');
    setResult('sw-state', 'Service Worker State',
      sub ? 'pass' : 'warn',
      sub ? 'SW active with push subscription' : 'SW active but no push subscription on this browser',
      detail);
  } catch(e) {
    setResult('sw-state', 'Service Worker State', 'fail', e.message);
  }
}

// ── Run all ──────────────────────────────────────────────────────────────────
async function runAll() {
  clearAll();
  log('=== Full debug run ===', 'info');
  await checkSecrets();
  await checkSubscriptions();
  await testSWDirect();
  await checkSWLogs();
  await testSendPush();
  log('=== Done ===', 'info');
}

function copyReport() {
  const rows = Array.from(document.querySelectorAll('.test-row')).map(el => {
    const status = [...el.classList].find(c => ['pass','fail','warn','info','running'].includes(c)) || '?';
    const name   = el.querySelector('.test-name')?.textContent || '';
    const detail = el.querySelector('.test-detail')?.textContent || '';
    const code   = el.querySelector('.code-block')?.textContent || '';
    return `[${status.toUpperCase()}] ${name}\n${detail}\n${code}`.trim();
  }).join('\n\n---\n\n');
  const logText = document.getElementById('log').innerText;
  navigator.clipboard.writeText(`PUSH DEBUG v2 REPORT\n${new Date().toISOString()}\n\n${rows}\n\nLOG:\n${logText}`)
    .then(() => log('Report copied to clipboard', 'pass'));
}
</script>
</body>
</html>
