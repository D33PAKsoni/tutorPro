<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Push Debug — Tuition Pro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0d12;
    --surface: #11151c;
    --surface2: #181d26;
    --border: #1e2535;
    --text: #e2e8f0;
    --muted: #64748b;
    --pass: #22c55e;
    --fail: #ef4444;
    --warn: #f59e0b;
    --info: #3b82f6;
    --accent: #6366f1;
    --font-mono: 'JetBrains Mono', monospace;
    --font-display: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.6;
    min-height: 100dvh;
    padding: 24px 16px 48px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .header-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .header h1 {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
  }
  .header p { color: var(--muted); font-size: 11px; margin-top: 2px; }

  /* Config section */
  .config-grid {
    display: grid;
    gap: 10px;
    margin-bottom: 20px;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .field label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .field input, .field textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .field input:focus, .field textarea:focus {
    border-color: var(--accent);
  }
  .field textarea { resize: vertical; min-height: 56px; }

  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }

  button {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    padding: 9px 16px;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  button:hover { background: var(--border); border-color: var(--accent); }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  button.primary:hover { background: #5254d4; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Test results */
  .section-title {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 10px;
    margin-top: 20px;
  }

  .tests { display: flex; flex-direction: column; gap: 6px; }

  .test-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: border-color 0.2s;
  }
  .test-row.pass  { border-left: 3px solid var(--pass); }
  .test-row.fail  { border-left: 3px solid var(--fail); }
  .test-row.warn  { border-left: 3px solid var(--warn); }
  .test-row.info  { border-left: 3px solid var(--info); }
  .test-row.running { border-left: 3px solid var(--accent); }

  .test-header { display: flex; align-items: center; gap: 8px; }
  .test-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }
  .pass  .test-badge { background: rgba(34,197,94,0.15);  color: var(--pass); }
  .fail  .test-badge { background: rgba(239,68,68,0.15);  color: var(--fail); }
  .warn  .test-badge { background: rgba(245,158,11,0.15); color: var(--warn); }
  .info  .test-badge { background: rgba(59,130,246,0.15); color: var(--info); }
  .running .test-badge { background: rgba(99,102,241,0.15); color: var(--accent); }

  .test-name { font-weight: 600; font-size: 12px; flex: 1; }
  .test-detail { color: var(--muted); font-size: 11px; padding-left: 2px; }
  .test-detail.error { color: #fca5a5; }
  .test-detail.code {
    background: var(--surface2);
    border-radius: 6px;
    padding: 8px 10px;
    margin-top: 4px;
    white-space: pre-wrap;
    word-break: break-all;
    font-size: 10.5px;
    color: #94a3b8;
  }

  /* Log console */
  #log {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    font-size: 11px;
    color: #94a3b8;
    max-height: 280px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    margin-top: 8px;
    line-height: 1.7;
  }
  #log .l-pass  { color: var(--pass); }
  #log .l-fail  { color: var(--fail); }
  #log .l-warn  { color: var(--warn); }
  #log .l-info  { color: var(--info); }
  #log .l-dim   { color: #334155; }

  .spinner {
    width: 12px; height: 12px;
    border: 2px solid rgba(99,102,241,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .copy-row {
    display: flex; gap: 8px; align-items: flex-start;
  }
  .copy-row textarea { flex: 1; }
  .copy-row button { flex-shrink: 0; margin-top: 0; padding: 9px 12px; }

  hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  .pill {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 2px 10px;
    font-size: 10px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🔔</div>
  <div>
    <h1>Push Notification Debugger</h1>
    <p>Tuition Pro — paste your config below, then run tests in order</p>
  </div>
</div>

<!-- CONFIG -->
<div class="section-title">① Configuration</div>
<div class="config-grid">
  <div class="field">
    <label>Supabase Project URL</label>
    <input id="cfg-url" type="url" placeholder="https://xxxxxxxxxxxx.supabase.co" />
  </div>
  <div class="field">
    <label>Supabase Anon Key</label>
    <input id="cfg-anon" type="text" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." />
  </div>
  <div class="field">
    <label>VAPID Public Key (from .env — VITE_VAPID_PUBLIC_KEY)</label>
    <input id="cfg-vapid" type="text" placeholder="BxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxC" />
  </div>
  <div class="field">
    <label>User ID (your Supabase auth user UUID — find in Dashboard → Auth → Users)</label>
    <input id="cfg-uid" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
  </div>
</div>

<div class="btn-row">
  <button class="primary" onclick="runAll()">▶ Run All Tests</button>
  <button onclick="runStep('browser')">① Browser Support</button>
  <button onclick="runStep('permission')">② Permission</button>
  <button onclick="runStep('sw')">③ Service Worker</button>
  <button onclick="runStep('subscribe')">④ Subscribe</button>
  <button onclick="runStep('db')">⑤ Check DB Row</button>
  <button onclick="runStep('send')">⑥ Send Push</button>
  <button onclick="clearAll()">✕ Clear</button>
</div>

<!-- RESULTS -->
<div class="section-title">② Test Results</div>
<div class="tests" id="results"></div>

<hr/>

<!-- EXTRA TOOLS -->
<div class="section-title">③ Extra Tools</div>
<div class="btn-row">
  <button onclick="showExistingSub()">Show Current Subscription</button>
  <button onclick="forceUnsub()">Force Unsubscribe</button>
  <button onclick="sendRawTest()">Send Raw Notification (SW direct)</button>
  <button onclick="copyReport()">Copy Full Report</button>
</div>

<div class="section-title">④ Console Log</div>
<div id="log">Waiting for tests…\n</div>

<script>
// ── State ───────────────────────────────────────────────────────────────────
const state = { results: [], log: [] };
let supabaseClient = null;

// ── Helpers ─────────────────────────────────────────────────────────────────
function cfg(id) { return document.getElementById(id)?.value?.trim() || ''; }

function log(msg, level='info') {
  const ts = new Date().toISOString().slice(11,23);
  const line = `[${ts}] ${msg}`;
  state.log.push({ line, level });
  const el = document.getElementById('log');
  const span = document.createElement('span');
  span.className = `l-${level}`;
  span.textContent = line + '\n';
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

function addResult(id, name, status, detail, code) {
  // status: pass | fail | warn | info | running
  const existing = document.getElementById('r-'+id);
  const html = `
    <div class="test-header">
      <span class="test-badge">${status === 'running' ? '…' : status}</span>
      <span class="test-name">${name}</span>
      ${status === 'running' ? '<div class="spinner"></div>' : ''}
    </div>
    ${detail ? `<div class="test-detail ${status==='fail'?'error':''}">${detail}</div>` : ''}
    ${code   ? `<div class="test-detail code">${code}</div>` : ''}
  `;
  if (existing) {
    existing.className = `test-row ${status}`;
    existing.innerHTML = html;
  } else {
    const div = document.createElement('div');
    div.id = 'r-' + id;
    div.className = `test-row ${status}`;
    div.innerHTML = html;
    document.getElementById('results').appendChild(div);
  }
}

function clearAll() {
  document.getElementById('results').innerHTML = '';
  document.getElementById('log').innerHTML = 'Cleared.\n';
  state.results = []; state.log = [];
}

// ── Supabase fetch helper (no SDK needed) ───────────────────────────────────
async function sbFetch(path, opts={}) {
  const url = cfg('cfg-url');
  const anon = cfg('cfg-anon');
  const res = await fetch(url + path, {
    ...opts,
    headers: {
      'apikey': anon,
      'Authorization': 'Bearer ' + anon,
      'Content-Type': 'application/json',
      ...(opts.headers||{}),
    },
  });
  const text = await res.text();
  let json; try { json = JSON.parse(text); } catch { json = text; }
  return { status: res.status, ok: res.ok, data: json };
}

// ── TEST: Browser Support ───────────────────────────────────────────────────
async function testBrowser() {
  addResult('browser', 'Browser Push Support', 'running', 'Checking APIs…');
  const checks = [];
  const sw   = 'serviceWorker' in navigator;
  const push = 'PushManager' in window;
  const notif = 'Notification' in window;
  const https = location.protocol === 'https:' || location.hostname === 'localhost';

  checks.push(`serviceWorker: ${sw ? '✓' : '✗'}`);
  checks.push(`PushManager: ${push ? '✓' : '✗'}`);
  checks.push(`Notification API: ${notif ? '✓' : '✗'}`);
  checks.push(`HTTPS/localhost: ${https ? '✓' : '✗ (REQUIRED)'}`);
  checks.push(`Browser: ${navigator.userAgent.slice(0,80)}`);

  const all = sw && push && notif && https;
  log(`Browser support: sw=${sw} push=${push} notif=${notif} https=${https}`, all?'pass':'fail');
  addResult('browser', 'Browser Push Support', all?'pass':'fail',
    all ? 'All required APIs present' : 'Missing required API — see details',
    checks.join('\n'));
  return all;
}

// ── TEST: Notification Permission ──────────────────────────────────────────
async function testPermission() {
  addResult('perm', 'Notification Permission', 'running', 'Checking…');
  const perm = Notification.permission;
  log(`Notification.permission = ${perm}`, perm==='granted'?'pass':perm==='denied'?'fail':'warn');

  let detail, code;
  if (perm === 'granted') {
    detail = 'Permission already granted ✓';
    addResult('perm', 'Notification Permission', 'pass', detail);
  } else if (perm === 'denied') {
    detail = 'Permission BLOCKED by user. Fix: browser address bar → lock icon → Notifications → Allow, then reload.';
    addResult('perm', 'Notification Permission', 'fail', detail);
  } else {
    detail = 'Permission is "default" — requesting now…';
    addResult('perm', 'Notification Permission', 'running', detail);
    const result = await Notification.requestPermission();
    log(`requestPermission() returned: ${result}`, result==='granted'?'pass':'fail');
    addResult('perm', 'Notification Permission', result==='granted'?'pass':'fail',
      `requestPermission() → "${result}"`,
      result !== 'granted' ? 'User denied or dismissed the permission prompt.' : null);
    return result === 'granted';
  }
  return perm === 'granted';
}

// ── TEST: Service Worker ────────────────────────────────────────────────────
async function testSW() {
  addResult('sw', 'Service Worker Registration', 'running', 'Checking…');
  try {
    const regs = await navigator.serviceWorker.getRegistrations();
    log(`Found ${regs.length} SW registration(s)`, regs.length>0?'pass':'warn');

    if (regs.length === 0) {
      addResult('sw', 'Service Worker Registration', 'fail',
        'No service worker registered. The SW must be active for push to work.',
        'Fix: Open your app at its deployed URL (not this debug page), then come back here.\nThe VitePWA SW registers when the app loads.');
      return false;
    }

    const reg = await navigator.serviceWorker.ready;
    const swState = reg.active?.state || 'none';
    const swUrl   = reg.active?.scriptURL || 'unknown';
    log(`SW active: state=${swState} url=${swUrl}`, 'pass');

    // Check push subscription
    const sub = await reg.pushManager.getSubscription();
    const detail = [
      `Registrations: ${regs.length}`,
      `Active SW: ${swUrl.split('/').pop()}`,
      `SW State: ${swState}`,
      `Push subscription: ${sub ? '✓ exists' : '✗ none (will be created in step ④)'}`,
      `Push sub endpoint: ${sub ? sub.endpoint.slice(0,60)+'…' : 'n/a'}`,
    ].join('\n');

    addResult('sw', 'Service Worker Registration', 'pass',
      `SW active, ${sub?'push subscription exists':'no push subscription yet'}`, detail);
    return true;
  } catch(e) {
    log(`SW check error: ${e.message}`, 'fail');
    addResult('sw', 'Service Worker Registration', 'fail', e.message);
    return false;
  }
}

// ── TEST: Subscribe ─────────────────────────────────────────────────────────
async function testSubscribe() {
  addResult('sub', 'Create Push Subscription', 'running', 'Subscribing…');
  const vapidKey = cfg('cfg-vapid');
  if (!vapidKey) {
    addResult('sub', 'Create Push Subscription', 'fail',
      'VAPID public key is empty — fill in the config above');
    return null;
  }

  try {
    // Decode VAPID key
    const padding = '='.repeat((4 - vapidKey.length % 4) % 4);
    const b64 = (vapidKey + padding).replace(/-/g, '+').replace(/_/g, '/');
    const appServerKey = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    log(`VAPID key decoded: ${appServerKey.length} bytes (expect 65)`, appServerKey.length===65?'pass':'fail');

    if (appServerKey.length !== 65) {
      addResult('sub', 'Create Push Subscription', 'fail',
        `VAPID key decoded to ${appServerKey.length} bytes — expected 65 (uncompressed P-256 public key)`,
        `Your key: ${vapidKey}\nMake sure you're using the PUBLIC key, not the private key.`);
      return null;
    }

    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();

    if (sub) {
      log('Existing subscription found — reusing', 'info');
    } else {
      log('No existing subscription — creating new one…', 'info');
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: appServerKey,
      });
      log('Subscription created successfully', 'pass');
    }

    const json = sub.toJSON();
    addResult('sub', 'Create Push Subscription', 'pass',
      'Subscription active',
      `endpoint: ${json.endpoint.slice(0,70)}…\np256dh: ${json.keys?.p256dh?.slice(0,40)}…\nauth: ${json.keys?.auth}`);
    return sub;
  } catch(e) {
    log(`Subscribe error: ${e.message}`, 'fail');
    let hint = '';
    if (e.message.includes('applicationServerKey')) hint = '\nHint: VAPID public key is malformed or mismatched.';
    if (e.message.includes('permission')) hint = '\nHint: Notification permission was not granted.';
    if (e.message.includes('network')) hint = '\nHint: Network error contacting push service.';
    addResult('sub', 'Create Push Subscription', 'fail', e.message + hint,
      `Full error: ${e.name}: ${e.message}`);
    return null;
  }
}

// ── TEST: Check DB row ──────────────────────────────────────────────────────
async function testDB(sub) {
  addResult('db', 'Subscription Saved in Database', 'running', 'Querying push_subscriptions…');
  const url = cfg('cfg-url');
  const anon = cfg('cfg-anon');
  const uid  = cfg('cfg-uid');

  if (!url || !anon) {
    addResult('db', 'Subscription Saved in Database', 'warn',
      'Supabase URL / Anon Key not filled in — skipping DB check');
    return;
  }

  try {
    // First save/upsert the subscription if we have one
    if (sub) {
      const json = sub.toJSON();
      const upsertRes = await sbFetch('/rest/v1/push_subscriptions', {
        method: 'POST',
        headers: { 'Prefer': 'resolution=merge-duplicates' },
        body: JSON.stringify({
          user_id:  uid || undefined,
          endpoint: json.endpoint,
          p256dh:   json.keys.p256dh,
          auth_key: json.keys.auth,
        }),
      });
      log(`Upsert subscription: HTTP ${upsertRes.status}`, upsertRes.ok?'pass':'fail');
      if (!upsertRes.ok) {
        addResult('db', 'Subscription Saved in Database', 'fail',
          `Upsert failed: HTTP ${upsertRes.status}`,
          JSON.stringify(upsertRes.data, null, 2));
        return;
      }
    }

    // Now query
    const filter = uid ? `?user_id=eq.${uid}&select=id,user_id,endpoint,created_at` : `?select=id,user_id,endpoint,created_at&limit=5`;
    const res = await sbFetch('/rest/v1/push_subscriptions' + filter);
    log(`DB query: HTTP ${res.status}, rows=${Array.isArray(res.data)?res.data.length:'?'}`, res.ok?'pass':'fail');

    if (!res.ok) {
      addResult('db', 'Subscription Saved in Database', 'fail',
        `Query failed: HTTP ${res.status}`,
        JSON.stringify(res.data, null, 2));
      return;
    }

    const rows = Array.isArray(res.data) ? res.data : [];
    if (rows.length === 0) {
      addResult('db', 'Subscription Saved in Database', 'fail',
        uid ? `No rows found for user_id=${uid}` : 'Table appears empty',
        'Fix: Run step ④ Subscribe first, OR check that user_id is correct.\nAlso check Supabase → Table Editor → push_subscriptions for any rows.');
    } else {
      addResult('db', 'Subscription Saved in Database', 'pass',
        `${rows.length} subscription row(s) found`,
        rows.map(r => `id=${r.id}\nuser_id=${r.user_id}\nendpoint=${r.endpoint?.slice(0,60)}…\ncreated=${r.created_at}`).join('\n---\n'));
    }
  } catch(e) {
    log(`DB check error: ${e.message}`, 'fail');
    addResult('db', 'Subscription Saved in Database', 'fail', e.message);
  }
}

// ── TEST: Send Push via Edge Function ───────────────────────────────────────
async function testSend() {
  addResult('send', 'Send Push via Edge Function', 'running', 'Calling send-push…');
  const url = cfg('cfg-url');
  const anon = cfg('cfg-anon');
  const uid  = cfg('cfg-uid');

  if (!url || !anon || !uid) {
    addResult('send', 'Send Push via Edge Function', 'warn',
      'Fill in Supabase URL, Anon Key, and User ID to test send');
    return;
  }

  try {
    log(`Invoking send-push for user_id=${uid}…`, 'info');
    const res = await fetch(`${url}/functions/v1/send-push`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${anon}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        user_id: uid,
        title: '🔔 Test from Debug Tool',
        body: 'If you see this, push notifications are working!',
        url: '/',
      }),
    });
    const text = await res.text();
    let data; try { data = JSON.parse(text); } catch { data = text; }
    log(`send-push response: HTTP ${res.status} — ${JSON.stringify(data)}`, res.ok?'pass':'fail');

    if (!res.ok) {
      addResult('send', 'Send Push via Edge Function', 'fail',
        `Edge function returned HTTP ${res.status}`,
        JSON.stringify(data, null, 2) + diagnoseSendError(res.status, data));
      return;
    }

    if (data.sent === 0 && data.message?.includes('No subscriptions')) {
      addResult('send', 'Send Push via Edge Function', 'fail',
        'Function ran but found no subscriptions for this user_id',
        `Response: ${JSON.stringify(data)}\n\nFix: Run steps ④ Subscribe and ⑤ DB first to create a subscription row.`);
      return;
    }

    addResult('send', 'Send Push via Edge Function', data.sent>0?'pass':'warn',
      data.sent > 0
        ? `✓ Sent to ${data.sent}/${data.total} subscription(s) — check your device for the notification!`
        : `Sent=0 / Total=${data.total} — function ran but delivery failed`,
      JSON.stringify(data, null, 2) + (data.sent===0 ? '\n\nPossible causes:\n- VAPID secrets wrong or not deployed\n- Subscription is expired (re-subscribe)\n- Push service returned error (check Supabase Edge Function logs)' : ''));
  } catch(e) {
    log(`send-push fetch error: ${e.message}`, 'fail');
    addResult('send', 'Send Push via Edge Function', 'fail',
      `Network error calling edge function: ${e.message}`,
      'Is the edge function deployed? Run: supabase functions deploy send-push');
  }
}

function diagnoseSendError(status, data) {
  const msg = JSON.stringify(data);
  let hints = '\n\n--- Diagnosis ---\n';
  if (status === 401 || status === 403) hints += '→ Auth error. Check SUPABASE_SERVICE_ROLE_KEY secret on the function.\n';
  if (status === 404) hints += '→ Function not found. Run: supabase functions deploy send-push\n';
  if (status === 500) {
    hints += '→ Internal error. Check Supabase Dashboard → Edge Functions → send-push → Logs.\n';
    if (msg.includes('VAPID')) hints += '→ VAPID secrets missing. Check Dashboard → Settings → Edge Functions → Secrets.\n';
    if (msg.includes('importKey') || msg.includes('crypto')) hints += '→ VAPID key import failed — private key may be in wrong format.\n';
  }
  return hints;
}

// ── EXTRA: Show existing subscription ──────────────────────────────────────
async function showExistingSub() {
  const regs = await navigator.serviceWorker.getRegistrations();
  if (!regs.length) { log('No SW registered', 'warn'); return; }
  const reg = await navigator.serviceWorker.ready;
  const sub = await reg.pushManager.getSubscription();
  if (!sub) { log('No active push subscription on this browser', 'warn'); return; }
  const json = sub.toJSON();
  log('=== Current Subscription ===', 'info');
  log(`endpoint: ${json.endpoint}`, 'info');
  log(`p256dh: ${json.keys?.p256dh}`, 'info');
  log(`auth: ${json.keys?.auth}`, 'info');
  log(`expirationTime: ${sub.expirationTime ?? 'none'}`, 'info');
}

// ── EXTRA: Force unsubscribe ────────────────────────────────────────────────
async function forceUnsub() {
  const regs = await navigator.serviceWorker.getRegistrations();
  if (!regs.length) { log('No SW registered', 'warn'); return; }
  const reg = await navigator.serviceWorker.ready;
  const sub = await reg.pushManager.getSubscription();
  if (!sub) { log('Nothing to unsubscribe', 'info'); return; }
  await sub.unsubscribe();
  log('Unsubscribed successfully. Run ④ Subscribe again.', 'pass');
}

// ── EXTRA: Raw SW notification (bypasses server entirely) ───────────────────
async function sendRawTest() {
  const perm = Notification.permission;
  if (perm !== 'granted') { log('Permission not granted', 'fail'); return; }
  const regs = await navigator.serviceWorker.getRegistrations();
  if (!regs.length) { log('No SW registered', 'warn'); return; }
  const reg = await navigator.serviceWorker.ready;
  await reg.showNotification('🔔 Raw SW Test', {
    body: 'This notification came directly from the SW — no server involved.',
    icon: '/icons/icon-192.png',
    tag: 'debug-raw',
  });
  log('Raw SW notification shown (no server). Did it appear?', 'pass');
  addResult('raw', 'Raw SW Notification (no server)', 'info',
    'Check if a notification appeared. If YES → browser/SW is fine, problem is server-side. If NO → browser is blocking notifications.');
}

// ── EXTRA: Copy report ──────────────────────────────────────────────────────
function copyReport() {
  const rows = Array.from(document.querySelectorAll('.test-row')).map(el => {
    const status = [...el.classList].find(c => ['pass','fail','warn','info','running'].includes(c));
    const name   = el.querySelector('.test-name')?.textContent || '';
    const detail = el.querySelector('.test-detail')?.textContent || '';
    const code   = el.querySelector('.test-detail.code')?.textContent || '';
    return `[${(status||'?').toUpperCase()}] ${name}\n${detail}\n${code}`.trim();
  }).join('\n\n');
  const logs = state.log.map(l => l.line).join('\n');
  const report = `PUSH NOTIFICATION DEBUG REPORT\n${new Date().toISOString()}\n\n${rows}\n\nCONSOLE LOG:\n${logs}`;
  navigator.clipboard.writeText(report).then(() => log('Report copied to clipboard', 'pass'));
}

// ── Run all ─────────────────────────────────────────────────────────────────
async function runAll() {
  clearAll();
  log('=== Starting full debug run ===', 'info');
  const ok1 = await testBrowser();   if (!ok1) { log('Stopping — browser missing required APIs', 'fail'); return; }
  const ok2 = await testPermission(); if (!ok2) { log('Stopping — permission not granted', 'fail'); return; }
  const ok3 = await testSW();        if (!ok3) { log('Stopping — no active SW', 'fail'); return; }
  const sub  = await testSubscribe();
  await testDB(sub);
  await testSend();
  log('=== Run complete ===', 'info');
}

async function runStep(step) {
  const map = {
    browser:   testBrowser,
    permission: testPermission,
    sw:        testSW,
    subscribe: testSubscribe,
    db:        testDB,
    send:      testSend,
  };
  if (map[step]) await map[step]();
}
