<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#00246a"/>
  <!-- Mortarboard cap -->
  <polygon points="256,120 420,200 256,280 92,200" fill="#ffffff" opacity="0.95"/>
  <!-- Cap tassel line -->
  <rect x="420" y="200" width="6" height="72" rx="3" fill="#b4c5ff"/>
  <circle cx="423" cy="278" r="10" fill="#b4c5ff"/>
  <!-- Book body -->
  <rect x="148" y="268" width="108" height="124" rx="8" fill="#ffffff" opacity="0.92"/>
  <rect x="256" y="268" width="108" height="124" rx="8" fill="#dbe1ff" opacity="0.92"/>
  <!-- Book spine -->
  <rect x="248" y="264" width="16" height="132" rx="4" fill="#00389a"/>
  <!-- Book lines (pages) -->
  <line x1="168" y1="300" x2="236" y2="300" stroke="#dbe1ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="168" y1="320" x2="236" y2="320" stroke="#dbe1ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="168" y1="340" x2="236" y2="340" stroke="#dbe1ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="276" y1="300" x2="344" y2="300" stroke="#8da9ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="276" y1="320" x2="344" y2="320" stroke="#8da9ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="276" y1="340" x2="344" y2="340" stroke="#8da9ff" stroke-width="5" stroke-linecap="round"/>
</svg>
